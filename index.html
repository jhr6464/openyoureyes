<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Doll - Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body { background-color: #000; width: 100vw; height: 100vh; }

        /* [수정] 모든 영상을 같은 자리에 겹치고 꽉 차게 설정 */
        #doll-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            background-color: #000; /* 영상 로딩 전 배경색 */
        }

        video.doll-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; /* 확대 방지 및 화면 꽉 채움 */
            opacity: 0; /* 기본적으로 숨김 */
            transition: opacity 0.1s ease; /* 잔상 제거를 위한 미세한 페이드 */
        }

        /* 활성화된 영상 스타일 */
        video.active {
            opacity: 1;
            z-index: 2;
        }

        #graphic-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('text.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 5;
            pointer-events: none;
            display: none;
        }

        #input_video {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 220px;
            border-radius: 12px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            transform: scaleX(-1);
            z-index: 10;
            background: #111;
            display: none;
        }

        #click-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('start.jpg');
            background-size: cover;
            background-position: center;
            z-index: 999;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="click-layer"></div>

    <div id="doll-container">
        <video id="v-open" class="doll-video" src="open.mp4" muted playsinline preload="auto"></video>
        <video id="v-closed" class="doll-video" src="closed.mp4" muted playsinline preload="auto"></video>
    </div>

    <div id="graphic-overlay"></div>
    <video id="input_video"></video>

    <script>
        const vOpen = document.getElementById('v-open');
        const vClosed = document.getElementById('v-closed');
        const inputVideo = document.getElementById('input_video');
        const clickLayer = document.getElementById('click-layer');
        const graphicOverlay = document.getElementById('graphic-overlay');
        
        let lastHandState = null; 
        let toggleTimestamps = [];

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const isHandOpen = landmarks[8].y < landmarks[6].y;
                const currentState = isHandOpen ? 'open' : 'closed';

                if (lastHandState !== currentState) {
                    const activeVideo = isHandOpen ? vOpen : vClosed;
                    const inactiveVideo = isHandOpen ? vClosed : vOpen;

                    // [핵심] 클래스 교체 방식으로 전환 (깜빡임과 확대 방지)
                    activeVideo.currentTime = 0;
                    activeVideo.play().then(() => {
                        activeVideo.classList.add('active');
                        inactiveVideo.classList.remove('active');
                        
                        // 이전 영상은 0.1초 뒤에 멈춤 (부드러운 전환)
                        setTimeout(() => {
                            if (lastHandState === currentState) inactiveVideo.pause();
                        }, 100);
                    });

                    toggleTimestamps.push(Date.now());
                    lastHandState = currentState;
                }

                const now = Date.now();
                toggleTimestamps = toggleTimestamps.filter(t => now - t < 2000);
                let speed = 1.0 + (toggleTimestamps.length * 0.3);
                if (speed > 5.0) speed = 5.0;

                vOpen.playbackRate = speed;
                vClosed.playbackRate = speed;
            }
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
        hands.onResults(onResults);

        const camera = new Camera(inputVideo, {
            onFrame: async () => { await hands.send({image: inputVideo}); },
            width: 640, height: 480
        });

        clickLayer.addEventListener('click', () => {
            clickLayer.style.display = 'none';
            inputVideo.style.display = 'block';
            graphicOverlay.style.display = 'block';
            
            // 첫 시작 시 v-open을 기본 활성화
            vOpen.classList.add('active');
            vOpen.play();
            
            camera.start();
        });
    </script>
</body>
</html>
