<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Doll - Controlled Play</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body { background-color: #000; width: 100vw; height: 100vh; }

        #doll-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        video.doll-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #graphic-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('text.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 5;
            pointer-events: none;
            display: none;
        }

        #input_video {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 240px;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transform: scaleX(-1);
            z-index: 10;
            background: #111;
            display: none;
        }

        #click-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('start.jpg');
            background-size: cover;
            background-position: center;
            z-index: 999;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="click-layer"></div>

    <div id="doll-container">
        <video id="v-open" class="doll-video" src="open.mp4" loop muted playsinline></video>
        <video id="v-closed" class="doll-video" src="closed.mp4" loop muted playsinline></video>
    </div>

    <div id="graphic-overlay"></div>
    <video id="input_video"></video>

    <script>
        const vOpen = document.getElementById('v-open');
        const vClosed = document.getElementById('v-closed');
        const inputVideo = document.getElementById('input_video');
        const clickLayer = document.getElementById('click-layer');
        const graphicOverlay = document.getElementById('graphic-overlay');
        
        let lastHandState = null;
        let toggleTimestamps = [];
        let isCameraActive = false;

        function onResults(results) {
            // 손이 감지되었을 때만 실행
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const isHandOpen = landmarks[8].y < landmarks[6].y;
                const currentState = isHandOpen ? 'open' : 'closed';

                // 손이 감지되면 그제서야 영상 재생 시작
                if (vOpen.paused) vOpen.play();
                if (vClosed.paused) vClosed.play();

                if (lastHandState !== null && lastHandState !== currentState) {
                    toggleTimestamps.push(Date.now());
                }
                lastHandState = currentState;

                const now = Date.now();
                toggleTimestamps = toggleTimestamps.filter(t => now - t < 2000);

                let speed = 1.0 + (toggleTimestamps.length * 0.25);
                if (speed > 5.0) speed = 5.0;

                vOpen.playbackRate = speed;
                vClosed.playbackRate = speed;

                if (isHandOpen) {
                    vOpen.style.display = 'block';
                    vClosed.style.display = 'none';
                } else {
                    vOpen.style.display = 'none';
                    vClosed.style.display = 'block';
                }
            } else {
                // [중요] 손이 화면에서 사라지면 영상 일시정지
                vOpen.pause();
                vClosed.pause();
                // 손이 안 보일 때는 마지막 상태의 영상을 그대로 멈춰두거나 숨길 수 있음
            }
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
        hands.onResults(onResults);

        const camera = new Camera(inputVideo, {
            onFrame: async () => { await hands.send({image: inputVideo}); },
            width: 640, height: 480
        });

        clickLayer.addEventListener('click', () => {
            clickLayer.style.display = 'none';
            inputVideo.style.display = 'block';
            graphicOverlay.style.display = 'block';
            
            // 카메라만 먼저 켜고, 영상은 onResults에서 손이 보일 때 play() 하도록 함
            camera.start();
            vOpen.style.display = 'block'; 
        });
    </script>
</body>
</html>
