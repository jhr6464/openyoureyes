<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Doll - Visual Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        /* 기본 여백 제거 및 배경 설정 */
        * { margin: 0; padding: 0; overflow: hidden; }
        body { background-color: #000; width: 100vw; height: 100vh; }

        /* 배경 인형 영상 (전체 화면) */
        #doll-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        video.doll-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* 우측 하단 사용자 캠 화면 */
        #input_video {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 240px; /* 적당한 가로 크기 */
            height: auto;
            border-radius: 16px; /* 부드러운 곡선 */
            border: 2px solid rgba(255, 255, 255, 0.2); /* 은은한 테두리 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* 입체감을 위한 그림자 */
            transform: scaleX(-1); /* 거울 모드 */
            z-index: 10;
            background: #111;
            display: none; /* 시작 전엔 숨김 */
        }

        /* 시작을 위한 투명 클릭 레이어 */
        #click-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 999;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="click-layer"></div>

    <div id="doll-container">
        <video id="v-open" class="doll-video" src="open.mp4" loop muted playsinline></video>
        <video id="v-closed" class="doll-video" src="closed.mp4" loop muted playsinline></video>
    </div>

    <video id="input_video"></video>

    <script>
        const vOpen = document.getElementById('v-open');
        const vClosed = document.getElementById('v-closed');
        const inputVideo = document.getElementById('input_video');
        const clickLayer = document.getElementById('click-layer');
        
        let lastHandState = null;
        let toggleTimestamps = [];

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const isHandOpen = landmarks[8].y < landmarks[6].y;
                const currentState = isHandOpen ? 'open' : 'closed';

                if (lastHandState !== null && lastHandState !== currentState) {
                    toggleTimestamps.push(Date.now());
                }
                lastHandState = currentState;

                const now = Date.now();
                toggleTimestamps = toggleTimestamps.filter(t => now - t < 2000);

                // 속도 계산 (1.0 ~ 5.0)
                let speed = 1.0 + (toggleTimestamps.length * 0.25);
                if (speed > 5.0) speed = 5.0;

                vOpen.playbackRate = speed;
                vClosed.playbackRate = speed;

                if (isHandOpen) {
                    vOpen.style.display = 'block';
                    vClosed.style.display = 'none';
                } else {
                    vOpen.style.display = 'none';
                    vClosed.style.display = 'block';
                }
            }
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
        hands.onResults(onResults);

        const camera = new Camera(inputVideo, {
            onFrame: async () => { await hands.send({image: inputVideo}); },
            width: 640, height: 480
        });

        // 클릭 시 인터랙션 시작
        clickLayer.addEventListener('click', () => {
            clickLayer.style.display = 'none';
            inputVideo.style.display = 'block'; // 클릭하면 캠 화면 등장
            camera.start();
            vOpen.play();
            vClosed.play();
            vOpen.style.display = 'block';
        });
    </script>
</body>
</html>
