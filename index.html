<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Doll - Hand Gesture</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* 인형 영상 컨테이너 */
        #doll-container {
            position: relative;
            width: 90vw;
            max-width: 600px;
            aspect-ratio: 16 / 9;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        video.doll-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* 내 카메라 화면 (작게 표시) */
        #input_video {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 90px;
            border-radius: 12px;
            transform: scaleX(-1); /* 좌우 반전 */
            border: 2px solid var(--accent-color);
            background: #000;
            z-index: 10;
        }

        /* 시작 화면 레이어 */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        button {
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background: var(--accent-color);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
        }

        button:hover {
            transform: scale(1.05);
            background: #0ea5e9;
        }

        .status-msg {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>Hand Gesture Interactive Doll</h1>
        <button id="start-btn">체험 시작하기</button>
        <p class="status-msg">카메라 권한이 필요합니다</p>
    </div>

    <h1>🖐️ 손을 펴고 접어보세요!</h1>

    <div id="doll-container">
        <video id="v-open" class="doll-video" src="open.mp4" loop muted playsinline></video>
        <video id="v-closed" class="doll-video" src="closed.mp4" loop muted playsinline></video>
    </div>

    <video id="input_video"></video>

    <script>
        const videoElement = document.getElementById('input_video');
        const vOpen = document.getElementById('v-open');
        const vClosed = document.getElementById('v-closed');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');

        // 손 인식 결과 처리
        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // 검지 손가락 끝(8)이 마디(6)보다 높이(y값이 작음) 있는지 확인
                const isHandOpen = landmarks[8].y < landmarks[6].y;

                if (isHandOpen) {
                    vOpen.style.display = 'block';
                    vClosed.style.display = 'none';
                } else {
                    vOpen.style.display = 'none';
                    vClosed.style.display = 'block';
                }
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });

        // 시작 버튼 클릭 시 작동
        startBtn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
            
            camera.start();
            vOpen.play();
            vClosed.play();
            
            // 초기 상태는 눈 뜬 영상
            vOpen.style.display = 'block';
        });
    </script>
</body>
</html>
