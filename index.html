<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Gesture Video Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #000; }
        
        #project-container {
            position: relative;
            width: 800px;
            height: 600px;
            overflow: hidden;
            background: #111;
        }

        /* 메인 영상: start.jpg를 포스터로 설정 */
        #main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 영상 위에 올라가는 text.png 이미지 */
        #text-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* 이미지가 마우스 클릭을 방해하지 않도록 설정 */
            object-fit: contain;
        }

        /* 인식용 웹캠 (화면에는 보이지 않게 숨김) */
        #input-webcam {
            display: none;
        }
    </style>
</head>
<body>

<div id="project-container">
    <video id="main-video" poster="start.jpg">
        <source src="your-video.mp4" type="video/mp4">
    </video>

    <img src="text.png" id="text-overlay" alt="Overlay Text">

    <video id="input-webcam"></video>
</div>

<script>
    const videoElement = document.getElementById('input-webcam');
    const mainVideo = document.getElementById('main-video');

    function onResults(results) {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];

            // 손가락 개폐 여부 판단 (Y축 좌표 값이 작을수록 화면 위쪽임을 이용)
            // 검지(8), 중지(12), 약지(16), 소지(20) 끝마디가 각각의 중간 마디(6, 10, 14, 18)보다 위에 있는지 확인
            const isOpen = 
                landmarks[8].y < landmarks[6].y && 
                landmarks[12].y < landmarks[10].y &&
                landmarks[16].y < landmarks[14].y &&
                landmarks[20].y < landmarks[18].y;

            if (isOpen) {
                // 손을 펴고 있을 때 -> 영상 재생
                if (mainVideo.paused) {
                    mainVideo.play().catch(e => console.log("재생 오류:", e));
                }
            } else {
                // 손을 접고 있거나 주먹 상태 -> 마지막 프레임에서 멈춤 (일시정지)
                if (!mainVideo.paused) {
                    mainVideo.pause();
                }
            }
        } else {
            // 손이 감지되지 않을 때도 멈추게 하려면 여기에 pause() 추가 가능
            if (!mainVideo.paused) {
                mainVideo.pause();
            }
        }
    }

    // MediaPipe Hands 설정
    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults(onResults);

    // 카메라 실행 로직
    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 640,
        height: 480
    });

    camera.start();

    // 브라우저 정책상 첫 재생은 사용자 인터랙션이 필요할 수 있으므로 
    // 화면을 한 번 클릭하면 카메라와 인터랙션이 활성화되도록 유도하는 것이 좋습니다.
    window.addEventListener('click', () => {
        console.log("인터랙션 활성화");
    }, { once: true });

</script>

</body>
</html>
